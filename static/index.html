<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Docker Build</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="/static/js/app.js"></script>
  <style type="text/tailwindcss">
    [x-cloak] { display: none !important; }
    .log-box { font-family: 'Menlo', 'Monaco', monospace; font-size: 12px; }
    .btn-primary   { @apply bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm; }
    .btn-secondary { @apply bg-gray-700 hover:bg-gray-600 text-gray-200 px-4 py-2 rounded-lg text-sm font-medium transition-colors; }
    .btn-danger    { @apply text-red-400 hover:text-red-300 hover:bg-red-900/20 px-3 py-1.5 rounded-lg text-sm transition-colors; }
    .btn-sm        { @apply !px-3 !py-1.5 !text-xs; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen" style="visibility:hidden" x-data="app()" x-init="init()">

  <div data-template="/static/templates/login.html"></div>
  <div data-template="/static/templates/header.html"></div>

  <main x-show="isAuthenticated" x-cloak class="p-6 max-w-6xl mx-auto">
    <div data-template="/static/templates/tab-repos.html"></div>
    <div data-template="/static/templates/tab-builds.html"></div>
    <div data-template="/static/templates/tab-images.html"></div>
    <div data-template="/static/templates/tab-containers.html"></div>
  </main>

  <div data-template="/static/templates/modal-log.html"></div>
  <div data-template="/static/templates/modal-container-log.html"></div>

</body>
</html>
