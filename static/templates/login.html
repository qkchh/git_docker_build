<div x-show="!isAuthenticated" x-cloak
  class="fixed inset-0 bg-gray-950 flex items-center justify-center z-50">
  <div class="bg-gray-900 border border-gray-700 rounded-xl p-8 w-full max-w-sm shadow-2xl ring-1 ring-white/5">
    <div class="text-center mb-6">
      <div class="text-3xl mb-2">⚙</div>
      <h1 class="text-lg font-bold">Git Docker Build</h1>
      <p class="text-gray-500 text-sm mt-1" x-text="lang === 'zh' ? '请输入访问 Token' : 'Enter access token'"></p>
    </div>
    <input
      x-model="tokenInput"
      type="password"
      :placeholder="lang === 'zh' ? 'Token' : 'Token'"
      @keydown.enter="submitToken()"
      class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm font-mono focus:outline-none focus:border-blue-500 mb-3" />
    <p x-show="authError" x-text="authError" class="text-red-400 text-sm mb-3"></p>
    <button @click="submitToken()"
      class="btn-primary w-full py-2.5"
      x-text="lang === 'zh' ? '进入' : 'Enter'">
    </button>
  </div>
</div>
