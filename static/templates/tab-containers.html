<div x-show="currentTab === 'containers'" x-cloak>
  <div class="flex items-end justify-between gap-4 mb-7">
    <div><div class="page-kicker mb-2">Runtime</div><h2 class="text-3xl font-bold tracking-tight" x-text="t('heading_containers')"></h2><p class="text-sm text-gray-500 mt-2" x-text="lang === 'zh' ? '控制运行实例并快速查看服务日志' : 'Control running instances and inspect service logs'"></p></div>
    <button @click="loadContainers()" class="btn-secondary btn-sm"
      x-text="'↻ ' + t('btn_refresh')"></button>
  </div>
  <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-md ring-1 ring-white/5">
    <template x-if="containers.length === 0">
      <div class="flex flex-col items-center justify-center py-16 text-center">
        <div class="text-4xl mb-3 opacity-30">📦</div>
        <p class="text-gray-500 text-sm" x-text="t('no_containers')"></p>
      </div>
    </template>
    <template x-if="containers.length > 0">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-800 text-gray-500 text-xs uppercase">
            <th class="text-left px-4 py-3" x-text="t('col_name')"></th>
            <th class="text-left px-4 py-3 w-48" x-text="t('col_image')"></th>
            <th class="text-left px-4 py-3 w-20" x-text="t('col_status')"></th>
            <th class="text-left px-4 py-3 w-28">ID</th>
            <th class="px-4 py-3 w-px"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-800">
          <template x-for="c in containers" :key="c.id">
            <tr class="hover:bg-gray-800/40 transition-colors">
              <td class="px-4 py-3 font-medium break-all" x-text="c.name"></td>
              <td class="px-4 py-3 text-gray-400 text-xs font-mono max-w-0 w-48 truncate" :title="c.image" x-text="c.image"></td>
              <td class="px-4 py-3 w-20">
                <span :class="c.status === 'running'
                    ? 'bg-green-400/10 text-green-400 ring-1 ring-green-400/30'
                    : 'bg-gray-400/10 text-gray-400 ring-1 ring-gray-400/30'"
                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
                  x-text="c.status">
                </span>
              </td>
              <td class="px-4 py-3 font-mono text-xs text-gray-500 w-28" x-text="c.id"></td>
              <td class="px-4 py-3 w-px whitespace-nowrap">
                <div class="flex justify-end gap-1">
                  <button x-show="c.status !== 'running'" @click="containerAction(c.id, 'start')"
                    class="text-xs bg-green-800/50 hover:bg-green-700/50 text-green-400 px-2 py-1 rounded-lg transition-colors"
                    x-text="t('btn_start')">
                  </button>
                  <button x-show="c.status === 'running'" @click="containerAction(c.id, 'stop')"
                    class="text-xs bg-yellow-800/50 hover:bg-yellow-700/50 text-yellow-400 px-2 py-1 rounded-lg transition-colors"
                    x-text="t('btn_stop')">
                  </button>
                  <button x-show="c.status === 'running'" @click="containerAction(c.id, 'restart')"
                    class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 px-2 py-1 rounded-lg transition-colors"
                    x-text="t('btn_restart')">
                  </button>
                  <button @click="viewContainerLogs(c)"
                    class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 px-2 py-1 rounded-lg transition-colors"
                    x-text="t('btn_logs')">
                  </button>
                  <button @click="containerAction(c.id, 'remove')"
                    class="btn-danger btn-sm"
                    x-text="t('btn_remove')">
                  </button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </template>
  </div>
</div>
