<div x-show="confirmModal" x-cloak
  class="fixed inset-0 bg-black/70 flex items-center justify-center z-[60] p-4">
  <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-sm shadow-2xl ring-1 ring-white/5 p-6">
    <p class="text-gray-200 mb-6" x-text="confirmModal?.message"></p>
    <div class="flex justify-end gap-3">
      <button @click="confirmCancel()" class="btn-secondary" x-text="t('btn_cancel')"></button>
      <button @click="confirmOk()" class="btn-danger-solid" x-text="t('btn_confirm_ok')"></button>
    </div>
  </div>
</div>
