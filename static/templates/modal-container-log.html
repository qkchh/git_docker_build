<div x-show="containerLogModal" x-cloak
  class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4"
  @click.self="containerLogModal = null">
  <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-3xl max-h-[80vh] flex flex-col shadow-2xl ring-1 ring-white/5">
    <div class="px-5 py-3 border-b border-gray-800 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-3">
        <div class="flex gap-1.5">
          <span class="w-3 h-3 rounded-full bg-red-500/70"></span>
          <span class="w-3 h-3 rounded-full bg-yellow-500/70"></span>
          <span class="w-3 h-3 rounded-full bg-green-500/70"></span>
        </div>
        <span class="font-medium text-sm">
          <span x-text="t('container_log_title')"></span> —
          <span class="text-blue-400" x-text="containerLogModal?.name"></span>
        </span>
      </div>
      <div class="flex items-center gap-2">
        <button @click="refreshContainerLogs()"
          :disabled="containerLogsRefreshing"
          class="text-xs px-2 py-1 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
          x-text="containerLogsRefreshing ? '...' : t('btn_refresh_logs')">
        </button>
        <button @click="containerLogModal = null" class="text-gray-500 hover:text-white transition-colors">✕</button>
      </div>
    </div>
    <div class="log-box bg-gray-950 p-4 overflow-y-auto flex-1 whitespace-pre-wrap text-gray-300 text-xs"
      x-text="containerLogModal?.logs"></div>
  </div>
</div>
