<div x-show="currentTab === 'builds'" x-cloak>
  <div class="flex items-end justify-between gap-4 mb-7">
    <div><div class="page-kicker mb-2">Delivery pipeline</div><h2 class="text-3xl font-bold tracking-tight" x-text="t('heading_builds')"></h2><p class="text-sm text-gray-500 mt-2" x-text="lang === 'zh' ? '查看构建状态、输出日志与交付历史' : 'Monitor build status, output and delivery history'"></p></div>
    <button @click="loadBuilds()" class="btn-secondary btn-sm"
      x-text="'↻ ' + t('btn_refresh')"></button>
  </div>

  <!-- Active Build Log -->
  <div x-show="activeBuild" x-cloak class="bg-gray-900 border border-gray-700 rounded-xl mb-5 shadow-md ring-1 ring-white/5 overflow-hidden">
    <!-- Terminal chrome -->
    <div class="px-5 py-3 border-b border-gray-800 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="flex gap-1.5">
          <span class="w-3 h-3 rounded-full bg-red-500/70"></span>
          <span class="w-3 h-3 rounded-full bg-yellow-500/70"></span>
          <span class="w-3 h-3 rounded-full bg-green-500/70"></span>
        </div>
        <span class="text-sm font-medium" x-text="t('label_build')"></span>
        <code class="text-xs bg-gray-800 px-2 py-0.5 rounded text-yellow-400" x-text="activeBuild?.image_name"></code>
        <span :class="buildStatusClass(activeBuild?.status || 'pending')"
          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
          x-text="t('status_' + (activeBuild?.status || 'pending'))">
        </span>
      </div>
      <div class="flex items-center gap-2">
        <button x-show="activeBuild?.status === 'running'" @click="cancelBuild()"
          class="bg-red-700 hover:bg-red-600 px-3 py-1 rounded-lg text-xs font-medium transition-colors"
          x-text="t('btn_cancel_build')">
        </button>
        <button @click="activeBuild = null; buildLog = []" class="text-gray-500 hover:text-white text-sm transition-colors">✕</button>
      </div>
    </div>
    <div class="log-box bg-gray-950 p-4 h-72 overflow-y-auto" x-ref="logBox">
      <template x-for="(line, i) in buildLog" :key="i">
        <div :class="{
          'text-red-400':    line.startsWith('[ERROR]'),
          'text-yellow-400': line.startsWith('[WARN]'),
          'text-blue-400':   line.startsWith('[INFO]'),
          'text-green-400':  line.startsWith('[DONE]'),
          'text-gray-300':   !line.startsWith('[ERROR]') && !line.startsWith('[WARN]') && !line.startsWith('[INFO]') && !line.startsWith('[DONE]')
        }" x-text="line"></div>
      </template>
    </div>
  </div>

  <!-- Build List -->
  <div class="space-y-2">
    <template x-if="builds.length === 0">
      <div class="flex flex-col items-center justify-center py-16 text-center">
        <div class="text-4xl mb-3 opacity-30">🔨</div>
        <p class="text-gray-500 text-sm" x-text="t('no_builds')"></p>
      </div>
    </template>
    <template x-for="build in builds" :key="build.id">
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shadow-md hover:border-gray-700 ring-1 ring-white/5 transition-all">
        <div class="flex flex-wrap items-center gap-3 min-w-0">
          <span :class="buildStatusClass(build.status)"
            class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium shrink-0"
            x-text="t('status_' + build.status)">
          </span>
          <code class="text-xs bg-gray-800 px-2 py-0.5 rounded text-yellow-400" x-text="build.image_name"></code>
          <span class="text-sm text-gray-400 truncate max-w-xs"
            x-text="build.commit_message || build.commit_sha.slice(0,8)"></span>
        </div>
        <div class="flex items-center justify-between sm:justify-end gap-4">
          <span class="text-xs text-gray-600" x-text="formatDate(build.created_at)"></span>
          <button x-show="build.log" @click="showBuildLog(build)"
            class="btn-secondary btn-sm"
            x-text="t('btn_logs')">
          </button>
        </div>
      </div>
    </template>
  </div>
</div>
