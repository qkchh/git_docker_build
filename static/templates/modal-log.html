<div x-show="logModal" x-cloak
  x-init="$watch('logModal', v => { if (v) $nextTick(() => { if ($refs.buildLogScroll) $refs.buildLogScroll.scrollTop = $refs.buildLogScroll.scrollHeight }) })"
  class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-3xl max-h-[80vh] flex flex-col shadow-2xl ring-1 ring-white/5">
    <div class="px-5 py-3 border-b border-gray-800 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-3">
        <div class="flex gap-1.5">
          <span class="w-3 h-3 rounded-full bg-red-500/70"></span>
          <span class="w-3 h-3 rounded-full bg-yellow-500/70"></span>
          <span class="w-3 h-3 rounded-full bg-green-500/70"></span>
        </div>
        <span class="font-medium text-sm" x-text="logModal?.image_name"></span>
      </div>
      <button @click="logModal = null" class="text-gray-500 hover:text-white transition-colors">✕</button>
    </div>
    <div x-ref="buildLogScroll" class="log-box bg-gray-950 p-4 overflow-y-auto flex-1 whitespace-pre-wrap text-gray-300"
      x-text="logModal?.log || t('no_log')"></div>
  </div>
</div>
